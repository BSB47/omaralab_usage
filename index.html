<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yaofu · usage</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 3rem 4rem;
      max-width: 600px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
    }
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      border: 3px solid #58a6ff;
      margin-bottom: 1.25rem;
    }
    h1 { font-size: 1.75rem; font-weight: 600; }
    h1 a { color: #58a6ff; text-decoration: none; }
    h1 a:hover { text-decoration: underline; }
    .tagline { color: #8b949e; margin: .5rem 0 1.5rem; font-size: 1rem; }
    .section { margin: 1.5rem 0; }
    .section h2 {
      font-size: .85rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #8b949e;
      margin-bottom: .75rem;
    }
    .project-list { list-style: none; text-align: left; }
    .project-list li {
      padding: .6rem 0;
      border-bottom: 1px solid #21262d;
    }
    .project-list li:last-child { border-bottom: none; }
    .project-list a { color: #58a6ff; text-decoration: none; font-weight: 500; }
    .project-list a:hover { text-decoration: underline; }
    .project-list .desc { color: #8b949e; font-size: .875rem; margin-top: .15rem; }
    .footer { margin-top: 2rem; font-size: .8rem; color: #484f58; }
    .footer a { color: #58a6ff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <img class="avatar" src="https://github.com/yaofu.png" alt="avatar">
    <h1><a href="https://github.com/yaofu">yaofu</a></h1>
    <p class="tagline">usage &middot; data playground</p>

    <div class="section">
      <h2>Projects</h2>
      <ul class="project-list">
        <li>
          <a href="https://github.com/yaofu/usage">usage</a>
          <div class="desc">Usage data analysis with Streamlit</div>
        </li>
      </ul>
    </div>

    <div class="footer">
      <a href="https://github.com/yaofu/usage">source</a>
    </div>
  </div>
</body>
</html>
